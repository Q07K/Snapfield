name: Android

# Builds the receiver APK whenever the android/ tree changes, so the scaffold
# stays green without waiting for a release tag. The APK lands as a workflow
# artifact (debug-key signed — installable, but updating over a differently
# signed build needs an uninstall first).
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: gradle -p android assembleRelease -PversionName=ci-${{ github.run_number }} -PversionCode=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-apk
          path: android/app/build/outputs/apk/release/*.apk
