name: Release

# Push a version tag (e.g. v1.0.0) to build the portable exe and publish a
# GitHub Release with it attached. Manual runs build + upload a workflow
# artifact without creating a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required for softprops/action-gh-release to create the release

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Snapfield.sln

      - name: Test
        run: dotnet test Snapfield.sln --configuration Release --no-restore

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          dotnet publish src/Snapfield.App/Snapfield.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish

      - name: Stage release asset
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "dev" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish/Snapfield.App.exe "dist/Snapfield-$version.exe"
          Get-ChildItem dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-exe
          path: dist/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          body: |
            ## Snapfield ${{ github.ref_name }}

            **다운로드**: 아래 `Snapfield-${{ github.ref_name }}.exe`를 받아 실행하세요.
            .NET 런타임이 내장된 포터블 단일 실행 파일이라 설치가 필요 없습니다.

            > 처음 실행 시 SmartScreen 경고가 뜨면 **추가 정보 → 실행**을 누르세요
            > (코드 서명이 없는 exe라서 표시됩니다).

  # Android receiver APK — attached to the same release after the exe job.
  # Signs with the repo keystore when the ANDROID_KEYSTORE_B64 secret exists;
  # otherwise falls back to a debug key (installable, but updates over a
  # differently-signed build need an uninstall).
  build-android:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare signing (optional)
        shell: bash
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/snapfield.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/snapfield.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev"; fi
          gradle -p android assembleRelease -PversionName="$VERSION" -PversionCode=${{ github.run_number }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/*.apk "dist/Snapfield-${GITHUB_REF_NAME}.apk"
          ls dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-apk
          path: dist/*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
