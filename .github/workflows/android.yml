name: Android

# On-demand APK build (manual runs only). Releases are the single CI trigger:
# every functional change bumps the version and ships via a v* tag, so the
# release workflow already builds the APK — this stays for ad-hoc test builds.
# Signs with the repo keystore when the secrets exist (same signature as
# releases — artifact APKs update over installed ones), else a debug key.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare signing (optional)
        shell: bash
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            # The pasted secret may carry CR/LF/spaces — strip before decoding.
            printf '%s' "$KS_B64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/snapfield.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/snapfield.keystore" >> "$GITHUB_ENV"
            # A Windows-exported PFX names its key with a GUID, not a chosen
            # alias — ask the store itself instead of guessing.
            alias=$(keytool -list -keystore "$RUNNER_TEMP/snapfield.keystore" -storepass "$KS_PASS" -storetype pkcs12 2>/dev/null \
              | awk -F',' '/PrivateKeyEntry/ {gsub(/^[ \t]+/, "", $1); print $1; exit}')
            if [ -n "$alias" ]; then echo "ANDROID_KEY_ALIAS=$alias" >> "$GITHUB_ENV"; fi
          fi

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: gradle -p android assembleRelease -PversionName=ci-${{ github.run_number }} -PversionCode=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-apk
          path: android/app/build/outputs/apk/release/*.apk
