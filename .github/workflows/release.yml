name: Release

# Push a version tag (e.g. v1.0.0) to build the portable exe and publish a
# GitHub Release with it attached. Manual runs build + upload a workflow
# artifact without creating a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required for softprops/action-gh-release to create the release

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Snapfield.sln

      - name: Test
        run: dotnet test Snapfield.sln --configuration Release --no-restore

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          dotnet publish src/Snapfield.App/Snapfield.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish

      - name: Publish Linux receiver (self-contained single-file)
        shell: pwsh
        run: |
          dotnet publish src/Snapfield.LinuxReceiver/Snapfield.LinuxReceiver.csproj `
            --configuration Release `
            --runtime linux-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            --output publish-linux

      - name: Stage release asset
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "dev" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish/Snapfield.App.exe "dist/Snapfield-$version.exe"
          Copy-Item publish-linux/snapfield-receiver "dist/Snapfield-Receiver-$version-linux-x64"
          Get-ChildItem dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-exe
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Snapfield ${{ github.ref_name }}

            **다운로드**: 아래 `Snapfield-${{ github.ref_name }}.exe`를 받아 실행하세요.
            .NET 런타임이 내장된 포터블 단일 실행 파일이라 설치가 필요 없습니다.

            > 처음 실행 시 SmartScreen 경고가 뜨면 **추가 정보 → 실행**을 누르세요
            > (코드 서명이 없는 exe라서 표시됩니다).

            > 앱은 **관리자 권한으로 실행**됩니다 (실행 시 UAC 승인 1회) —
            > 작업 관리자 등 관리자 권한 창 위에서도 원격 조작이 동작하기 위해 필요합니다.
            > "로그인 시 자동 실행"을 켜면 부팅 후에는 UAC 없이 시작됩니다.

            **리눅스 수신기**: `Snapfield-Receiver-*-linux-x64` — 우분투 데스크톱(Wayland/X11)을
            수신 기기로 만드는 콘솔 데몬. 사용법은 README의 "리눅스 수신 기기" 절 참고
            (`chmod +x` 후 실행, 최초 1회 uinput udev 규칙 필요).

  # Android receiver APK — attached to the same release after the exe job.
  # Signs with the repo keystore when the ANDROID_KEYSTORE_B64 secret exists;
  # otherwise falls back to a debug key (installable, but updates over a
  # differently-signed build need an uninstall).
  build-android:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare signing (optional)
        shell: bash
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            # The pasted secret may carry CR/LF/spaces — strip before decoding.
            printf '%s' "$KS_B64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/snapfield.keystore"
            echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/snapfield.keystore" >> "$GITHUB_ENV"
            # A Windows-exported PFX names its key with a GUID, not a chosen
            # alias — ask the store itself instead of guessing.
            alias=$(keytool -list -keystore "$RUNNER_TEMP/snapfield.keystore" -storepass "$KS_PASS" -storetype pkcs12 2>/dev/null \
              | awk -F',' '/PrivateKeyEntry/ {gsub(/^[ \t]+/, "", $1); print $1; exit}')
            if [ -n "$alias" ]; then echo "ANDROID_KEY_ALIAS=$alias" >> "$GITHUB_ENV"; fi
          fi

      - name: Build APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; else VERSION="0.0.0-dev"; fi
          gradle -p android assembleRelease -PversionName="$VERSION" -PversionCode=${{ github.run_number }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/*.apk "dist/Snapfield-${GITHUB_REF_NAME}.apk"
          ls dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapfield-apk
          path: dist/*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
